<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CloudGuide Lite</title>
  <link rel="icon" href="data:," />
  <link rel="stylesheet" href="./style.css" />
</head>

<body>
  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <h1>CloudGuide</h1>
    </div>
    <nav class="sidebar-nav">
      <button class="nav-btn active" data-panel="chat">💬 Chat</button>
      <button class="nav-btn" data-panel="quiz">🧠 Quiz</button>
    </nav>
  </aside>

  <!-- Main content -->
  <div class="main">
    <!-- Chat panel -->
    <section id="panel-chat" class="panel active">
      <div id="chat" class="chat" aria-live="polite"></div>

      <div id="templates" class="templates">
        <button class="template-btn" data-template="What is ">What is ...</button>
        <button class="template-btn" data-template="How does ">How does ...</button>
        <button class="template-btn" data-template="Explain the difference between ">Difference between ...</button>
        <button class="template-btn" data-template="Why is ">Why is ...</button>
        <button class="template-btn" data-template="What are the benefits of ">Benefits of ...</button>
      </div>

      <form id="chat-form" class="chat-form" autocomplete="off">
        <input id="chat-input" type="text" placeholder="Ask a cloud question..." maxlength="300" />
        <button type="submit">Send</button>
      </form>
    </section>

    <!-- Quiz panel -->
    <section id="panel-quiz" class="panel">
      <div class="quiz-card">
        <h2>🧠 Mini Quiz</h2>
        <p id="quiz-question">Press Start to begin.</p>
        <div id="quiz-options" class="quiz-options"></div>
        <p id="quiz-feedback" class="feedback"></p>
        <button id="quiz-start">Start Quiz</button>
        <p id="quiz-score" class="score">Score: 0 / 0</p>
      </div>
    </section>
  </div>

  <script src="./config.local.js"></script>
  <script src="./script.js"></script>
</body>

</html>
